---
name: "Create Release"

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to release (e.g., v0.2.0)"
                required: true
                type: string
    push:
        tags:
            - "v*"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    run-tests:
        uses: ./.github/workflows/reusable-tests.yml
        secrets: inherit

    autorelease:
        name: Create Release
        runs-on: "ubuntu-latest"
        needs: run-tests
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Read plugin version
              run: |
                  PLUGIN_VERSION=$(jq -r '.version' plugins/natelandau-toolkit/.claude-plugin/plugin.json)
                  echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> "$GITHUB_ENV"

            - name: Check tag matches plugin version
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      TAG="${{ github.event.inputs.tag }}"
                      if ! git rev-parse "$TAG" >/dev/null 2>&1; then
                          echo "::error::Tag $TAG does not exist"
                          exit 1
                      fi
                  else
                      TAG=$(git describe HEAD --tags --abbrev=0)
                  fi

                  echo "Tag: $TAG"
                  echo "Plugin version: $PLUGIN_VERSION"
                  if [[ "$TAG" != "v$PLUGIN_VERSION" ]]; then
                      echo "::error::Tag $TAG does not match plugin version v$PLUGIN_VERSION"
                      exit 1
                  fi

            - name: Get notes
              id: generate_notes
              uses: anmarkoulis/commitizen-changelog-reader@master
              with:
                  tag_name: refs/tags/v${{ env.PLUGIN_VERSION }}
                  changelog: CHANGELOG.md

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  body: ${{join(fromJson(steps.generate_notes.outputs.notes).notes, '')}}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
