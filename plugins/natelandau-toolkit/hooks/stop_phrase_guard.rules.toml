    pattern    = '\b(leav|left (it|as|the|that)|untouched|out of scope|as.?is|unrelated|not (address|fix|fixing|touch|implement|implementing|mine|worth|going to)|didn.?t (fix|address|touch|implement)|won.?t (fix|address|touch|implement)|ignore|ignoring|skipped|skipping|lives on (main|master)|predates).{0,100}pre.?existing\b'

