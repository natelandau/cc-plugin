# Violations for stop_phrase_guard.py. The Stop hook loads this file at
# invocation, compiles each `pattern` (regex, re.IGNORECASE), and tests
# the assistant's most recent turn text against them. First match wins;
# iteration follows file order. The matched `correction` is returned to
# Claude Code as the block reason with a `STOP HOOK VIOLATION:` prefix.
#
# Required fields per violation: pattern, correction.
#
# Pattern strings are TOML literals (single-quoted) so regex backslashes
# pass through verbatim. Correction strings use the basic (double-quoted)
# form so apostrophes in the prose are unescaped.

# =============================================================================
# Ownership dodging: #1 problem, dismissing failures as not-my-fault.
# =============================================================================

# The bare word "pre-existing" appears constantly in legitimate prose
# (review summaries, discussion of these very rules), so matching it
# alone false-positives. The dodge we care about is "pre-existing" used
# to justify NOT fixing/implementing something, so both patterns require
# an inaction phrase (leaving it, not fixing, untouched, out of scope,
# lives on main, ...) within ~100 chars of "pre-existing", in either
# order. `pre.?existing` covers "pre-existing", "pre existing", and
# "preexisting"; `.{0,100}` stays within a sentence (`.` skips newlines).
[[violation]]
    correction = "NOTHING IS PRE-EXISTING. All builds and tests are green upstream. If something fails, YOUR work caused it - investigate and fix it. If a feature would improve the codebase, add it. Never dismiss anything as pre-existing."
    pattern    = 'pre.?existing\b.{0,100}\b(leav|left (it|as|the|that)|untouched|out of scope|as.?is|unrelated|not (address|fix|fixing|touch|implement|implementing|mine|worth|going to)|didn.?t (fix|address|touch|implement)|won.?t (fix|address|touch|implement)|ignore|ignoring|skipped|skipping|lives on (main|master)|predates)'

