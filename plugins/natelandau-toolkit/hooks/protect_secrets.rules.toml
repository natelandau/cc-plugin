# Rules for protect_secrets.py. The hook loads this file at runtime and:
#
#   - For Read/Edit/Write tools, matches `tool_input.file_path` against each
#     `[[sensitive_file]]` entry's `pattern` (regex, re.IGNORECASE).
#   - For Bash, matches `tool_input.command` against each `[[bash_pattern]]`.
#
# `allowlist` regexes are tested first against both inputs; a match short-
# circuits and lets the tool call pass through (used for templates such as
# `.env.example`). First match wins within each rule list; iteration follows
# file order. Rules whose `level` is above the active threshold
# (CLAUDE_PROTECT_SECRETS_LEVEL) are skipped.
#
# Rule field schema (sensitive_file and bash_pattern): level, id, pattern,
# reason. `level` must be one of: critical, high, strict.
#
# Pattern strings are TOML literals (single-quoted) so regex backslashes
# pass through verbatim.

# Templates and example files that are always safe. Tested against both
# file paths (Read/Edit/Write) and the entire bash command string. The
# string-end anchors mean `cat .env.example` passes but `cat .env.example
# .env` does not, so the second file is still checked.
allowlist = [
    '\.env\.example$',
    '\.env\.sample$',
    '\.env\.template$',
    '\.env\.schema$',
    '\.env\.defaults$',
    '(?:^|/)env\.example$',
    '(?:^|/)example\.env$',
]


# =============================================================================
# Sensitive file rules: matched against file_path of Read/Edit/Write.
# =============================================================================

# === CRITICAL ===

[[sensitive_file]]
    id      = "env-file"
    level   = "critical"
    pattern = '(?:^|/)\.env(?:\.[^/]*)?$'
    reason  = ".env file contains secrets"

[[sensitive_file]]
    id      = "envrc"
    level   = "critical"
    pattern = '(?:^|/)\.envrc$'
    reason  = ".envrc (direnv) contains secrets"

[[sensitive_file]]
    id      = "ssh-private-key"
    level   = "critical"
    pattern = '(?:^|/)\.ssh/id_[^/]+$'
    reason  = "SSH private key"

[[sensitive_file]]
    id      = "ssh-private-key-bare"
    level   = "critical"
    pattern = '(?:^|/)(id_rsa|id_ed25519|id_ecdsa|id_dsa)$'
    reason  = "SSH private key"

[[sensitive_file]]
    id      = "ssh-authorized"
    level   = "critical"
    pattern = '(?:^|/)\.ssh/authorized_keys$'
    reason  = "SSH authorized_keys"

[[sensitive_file]]
    id      = "aws-credentials"
    level   = "critical"
    pattern = '(?:^|/)\.aws/credentials$'
    reason  = "AWS credentials file"

[[sensitive_file]]
    id      = "aws-config"
    level   = "critical"
    pattern = '(?:^|/)\.aws/config$'
    reason  = "AWS config may contain secrets"

[[sensitive_file]]
    id      = "kube-config"
    level   = "critical"
    pattern = '(?:^|/)\.kube/config$'
    reason  = "Kubernetes config contains credentials"

[[sensitive_file]]
    id      = "pem-key"
    level   = "critical"
    pattern = '\.pem$'
    reason  = "PEM key file"

[[sensitive_file]]
    id      = "key-file"
    level   = "critical"
    pattern = '\.key$'
    reason  = "Key file"

[[sensitive_file]]
    id      = "p12-key"
    level   = "critical"
    pattern = '\.(p12|pfx)$'
    reason  = "PKCS12 key file"

# === HIGH ===

[[sensitive_file]]
    id      = "credentials-json"
    level   = "high"
    pattern = '(?:^|/)credentials\.json$'
    reason  = "Credentials file"

[[sensitive_file]]
    id      = "secrets-file"
    level   = "high"
    pattern = '(?:^|/)(secrets?|credentials?)\.(json|ya?ml|toml)$'
    reason  = "Secrets configuration file"

[[sensitive_file]]
    id      = "service-account"
    level   = "high"
    pattern = 'service[_-]?account.*\.json$'
    reason  = "GCP service account key"

[[sensitive_file]]
    id      = "gcloud-creds"
    level   = "high"
    pattern = '(?:^|/)\.config/gcloud/.*(credentials|tokens)'
    reason  = "GCloud credentials"

[[sensitive_file]]
    id      = "azure-creds"
    level   = "high"
    pattern = '(?:^|/)\.azure/(credentials|accessTokens)'
    reason  = "Azure credentials"

[[sensitive_file]]
    id      = "docker-config"
    level   = "high"
    pattern = '(?:^|/)\.docker/config\.json$'
    reason  = "Docker config may contain registry auth"

[[sensitive_file]]
    id      = "netrc"
    level   = "high"
    pattern = '(?:^|/)\.netrc$'
    reason  = ".netrc contains credentials"

[[sensitive_file]]
    id      = "npmrc"
    level   = "high"
    pattern = '(?:^|/)\.npmrc$'
    reason  = ".npmrc may contain auth tokens"

[[sensitive_file]]
    id      = "pypirc"
    level   = "high"
    pattern = '(?:^|/)\.pypirc$'
    reason  = ".pypirc contains PyPI credentials"

[[sensitive_file]]
    id      = "gem-creds"
    level   = "high"
    pattern = '(?:^|/)\.gem/credentials$'
    reason  = "RubyGems credentials"

[[sensitive_file]]
    id      = "vault-token"
    level   = "high"
    pattern = '(?:^|/)(\.vault-token|vault-token)$'
    reason  = "Vault token file"

[[sensitive_file]]
    id      = "keystore"
    level   = "high"
    pattern = '\.(keystore|jks)$'
    reason  = "Java keystore"

[[sensitive_file]]
    id      = "htpasswd"
    level   = "high"
    pattern = '(?:^|/)\.?htpasswd$'
    reason  = "htpasswd contains hashed passwords"

[[sensitive_file]]
    id      = "pgpass"
    level   = "high"
    pattern = '(?:^|/)\.pgpass$'
    reason  = "PostgreSQL password file"

[[sensitive_file]]
    id      = "my-cnf"
    level   = "high"
    pattern = '(?:^|/)\.my\.cnf$'
    reason  = "MySQL config may contain password"

# === STRICT ===

[[sensitive_file]]
    id      = "database-config"
    level   = "strict"
    pattern = '(?:^|/)(?:config/)?database\.(json|ya?ml)$'
    reason  = "Database config may contain passwords"

[[sensitive_file]]
    id      = "ssh-known-hosts"
    level   = "strict"
    pattern = '(?:^|/)\.ssh/known_hosts$'
    reason  = "SSH known_hosts reveals infrastructure"

[[sensitive_file]]
    id      = "gitconfig"
    level   = "strict"
    pattern = '(?:^|/)\.gitconfig$'
    reason  = ".gitconfig may contain credentials"

[[sensitive_file]]
    id      = "curlrc"
    level   = "strict"
    pattern = '(?:^|/)\.curlrc$'
    reason  = ".curlrc may contain auth"


# =============================================================================
# Bash command rules: matched against the full command string.
# =============================================================================

# === CRITICAL: direct reads of secret files. ===

[[bash_pattern]]
    id      = "cat-env"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more|bat|view)\s+[^|;]*\.env\b'
    reason  = "Reading .env file exposes secrets"

[[bash_pattern]]
    id      = "cat-ssh-key"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more|bat)\s+[^|;]*(id_rsa|id_ed25519|id_ecdsa|id_dsa|\.pem|\.key)\b'
    reason  = "Reading private key"

[[bash_pattern]]
    id      = "cat-aws-creds"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*\.aws/credentials'
    reason  = "Reading AWS credentials"

# === HIGH: environment exposure. ===

[[bash_pattern]]
    id      = "env-dump"
    level   = "high"
    pattern = '\bprintenv\b|(?:^|[;&|]\s*)env\s*(?:$|[;&|])'
    reason  = "Environment dump may expose secrets"

[[bash_pattern]]
    id      = "echo-secret-var"
    level   = "high"
    pattern = '\becho\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|PASSW|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?'
    reason  = "Echoing secret variable"

[[bash_pattern]]
    id      = "printf-secret-var"
    level   = "high"
    pattern = '\bprintf\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?'
    reason  = "Printing secret variable"

[[bash_pattern]]
    id      = "cat-secrets-file"
    level   = "high"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*(credentials?|secrets?)\.(json|ya?ml|toml)'
    reason  = "Reading secrets file"

[[bash_pattern]]
    id      = "cat-netrc"
    level   = "high"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*\.netrc'
    reason  = "Reading .netrc credentials"

[[bash_pattern]]
    id      = "source-env"
    level   = "high"
    pattern = '\bsource\s+[^|;]*\.env\b|(?:^|[;&|]\s*)\.\s+[^|;]*\.env\b'
    reason  = "Sourcing .env loads secrets"

[[bash_pattern]]
    id      = "export-cat-env"
    level   = "high"
    pattern = 'export\s+.*\$\(cat\s+[^)]*\.env'
    reason  = "Exporting secrets from .env"

# === HIGH: exfiltration. ===

[[bash_pattern]]
    id      = "curl-upload-env"
    level   = "high"
    pattern = '\bcurl\b[^;|&]*(-d\s*@|-F\s*[^=]+=@|--data[^=]*=@)[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)'
    reason  = "Uploading secrets via curl"

[[bash_pattern]]
    id      = "curl-post-secrets"
    level   = "high"
    pattern = '\bcurl\b[^;|&]*-X\s*POST[^;|&]*(\.env|credentials|secrets)'
    reason  = "POSTing secrets via curl"

[[bash_pattern]]
    id      = "wget-post-secrets"
    level   = "high"
    pattern = '\bwget\b[^;|&]*--post-file[^;|&]*(\.env|credentials|secrets)'
    reason  = "POSTing secrets via wget"

[[bash_pattern]]
    id      = "scp-secrets"
    level   = "high"
    pattern = '\bscp\b[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)[^;|&]+:'
    reason  = "Copying secrets via scp"

[[bash_pattern]]
    id      = "rsync-secrets"
    level   = "high"
    pattern = '\brsync\b[^;|&]*(\.env|credentials|secrets|id_rsa)[^;|&]+:'
    reason  = "Syncing secrets via rsync"

[[bash_pattern]]
    id      = "nc-secrets"
    level   = "high"
    pattern = '\bnc\b[^;|&]*<[^;|&]*(\.env|credentials|secrets|id_rsa)'
    reason  = "Exfiltrating secrets via netcat"

# === HIGH: copy/move/delete of secret files. ===

[[bash_pattern]]
    id      = "cp-env"
    level   = "high"
    pattern = '\bcp\b[^;|&]*\.env\b'
    reason  = "Copying .env file"

[[bash_pattern]]
    id      = "cp-ssh-key"
    level   = "high"
    pattern = '\bcp\b[^;|&]*(id_rsa|id_ed25519|\.pem|\.key)\b'
    reason  = "Copying private key"

[[bash_pattern]]
    id      = "mv-env"
    level   = "high"
    pattern = '\bmv\b[^;|&]*\.env\b'
    reason  = "Moving .env file"

[[bash_pattern]]
    id      = "rm-ssh-key"
    level   = "high"
    pattern = '\brm\b[^;|&]*(id_rsa|id_ed25519|id_ecdsa|authorized_keys)'
    reason  = "Deleting SSH key"

[[bash_pattern]]
    id      = "rm-env"
    level   = "high"
    pattern = '\brm\b.*\.env\b'
    reason  = "Deleting .env file"

[[bash_pattern]]
    id      = "rm-aws-creds"
    level   = "high"
    pattern = '\brm\b[^;|&]*\.aws/credentials'
    reason  = "Deleting AWS credentials"

[[bash_pattern]]
    id      = "truncate-secrets"
    level   = "high"
    pattern = '\btruncate\b.*\.(env|pem|key)\b|(?:^|[;&|]\s*)>\s*\.env\b'
    reason  = "Truncating secrets file"

# === HIGH: process environ + indirect access. ===

[[bash_pattern]]
    id      = "proc-environ"
    level   = "high"
    pattern = '/proc/[^/]*/environ'
    reason  = "Reading process environment"

[[bash_pattern]]
    id      = "xargs-cat-env"
    level   = "high"
    pattern = 'xargs.*cat|\.env.*xargs'
    reason  = "Reading .env via xargs"

[[bash_pattern]]
    id      = "find-exec-cat-env"
    level   = "high"
    pattern = 'find\b.*\.env.*-exec|find\b.*-exec.*(cat|less)'
    reason  = "Finding and reading .env files"

# === STRICT ===

[[bash_pattern]]
    id      = "grep-password"
    level   = "strict"
    pattern = '\bgrep\b[^|;]*(-r|--recursive)[^|;]*(password|secret|api.?key|token|credential)'
    reason  = "Grep for secrets may expose them"

[[bash_pattern]]
    id      = "base64-secrets"
    level   = "strict"
    pattern = '\bbase64\b[^|;]*(\.env|credentials|secrets|id_rsa|\.pem)'
    reason  = "Base64 encoding secrets"
