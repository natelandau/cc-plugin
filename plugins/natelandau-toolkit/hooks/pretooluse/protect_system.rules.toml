# Rules for protect_system.py, loaded at runtime through the shared
# hooks/lib/rules.py engine. Each entry's `pattern` (regex, re.IGNORECASE)
# is matched against the bash command string. First match wins; iteration
# follows file order.
#
# Required fields per rule: id, reason, plus exactly one matcher.
#
# Matcher: either a `pattern` or a `conditions` array of
# `{ field, operator, pattern }` tables (AND-combined). protect_system
# matches a single command string, so a `pattern` is the natural form here. A
# `pattern` is a single regex string OR a list of regex strings (OR-combined:
# the rule fires if any matches), which is how same-category rules below
# collapse into one entry. A `pattern` rule may also set an optional `field`
# to target a named input (protect_system exposes `command` and `tool_name`);
# omitting it matches the command, so it is rarely needed here. See the
# "Rule data" section of CLAUDE.md for the full schema.
#
# Pattern strings are TOML literals (single-quoted) so regex backslashes
# pass through verbatim. The home-directory patterns include a single quote
# inside the regex character class, so they use the multi-line literal form
# ('''...''').

# === Catastrophic and largely unrecoverable. ===

[[rule]]
    id      = "rm-home"
    reason  = "rm targeting home directory"
    pattern = [
        '''\brm\b\s+(?:-\S+\s+)*[\"']?~/?[\"']?(?:\s|$|[;&|])''',
        '''\brm\b\s+(?:-\S+\s+)*[\"']?\$HOME/?[\"']?(?:\s|$|[;&|])''',
        '''\brm\b\s+\S.*\s[\"']?(?:~/?|\$HOME/?)[\"']?(?:\s*$|[;&|])''',
    ]

[[rule]]
    id      = "rm-system"
    reason  = "rm targeting system or root filesystem"
    pattern = [
        '\brm\b\s+(?:-\S+\s+)+/(?:\*|\s|$|[;&|])',
        '\brm\b\s+(?:-\S+\s+)*/(?:etc|usr|var|bin|sbin|lib|boot|dev|proc|sys)(?:/|\s|$|[;&|])',
    ]

[[rule]]
    id      = "rm-cwd"
    reason  = "rm of '.' or '*' wipes CWD contents"
    pattern = '\brm\b\s+(?:-\S+\s+)*(?:\./?|\*|\./\*)(?:\s|$|[;&|])'

[[rule]]
    id      = "disk-wipe"
    reason  = "Writing, formatting, or erasing a disk device"
    pattern = [
        '\bdd\b[^;|&]+\bof=/dev/(?:sd[a-z]|nvme\d+n\d+|hd[a-z]|vd[a-z]|xvd[a-z])',
        '\bmkfs(?:\.\w+)?\b[^;|&]+/dev/(?:sd[a-z]|nvme\d+n\d+|hd[a-z]|vd[a-z])',
        '\bdiskutil\s+(?:eraseDisk|eraseVolume|zeroDisk|secureErase)\b',
    ]

[[rule]]
    id      = "fork-bomb"
    reason  = "fork bomb"
    pattern = ':\s*\(\s*\)\s*\{[^}]*:\s*\|\s*:[^}]*&[^}]*\}'

[[rule]]
    id      = "kill-critical"
    reason  = "Signaling init or every process crashes the system"
    pattern = [
        '\bkill\b\s+(?:-\S+\s+)*1(?:\s|$|[;&|])',
        '\bkill\b\s+-\S+(?:\s+\S+)*\s+-1(?:\s|$|[;&|])',
        '\b(?:pkill|killall)\b[^;|&]*\b(?:init|systemd|launchd)(?:\s|$|[;&|])',
    ]

[[rule]]
    id      = "sysrq-trigger"
    reason  = "writing to sysrq-trigger crashes the kernel"
    pattern = '>\s*/proc/sysrq-trigger'

[[rule]]
    id      = "macos-integrity"
    reason  = "Destructive macOS system-integrity operation"
    pattern = [
        '\bcsrutil\s+(?:disable|clear)\b',
        '\bnvram\b[^;|&]*\s-c\b',
        '\btmutil\s+(?:delete|deletelocalsnapshots)\b',
    ]

# === Significant, hard-to-reverse damage. ===

[[rule]]
    id      = "curl-pipe-sh"
    reason  = "piping remote script to shell (RCE risk)"
    pattern = '\b(?:curl|wget)\b[^;&]*\|\s*(?:sudo\s+)?(?:bash|zsh|sh)\b'

[[rule]]
    id      = "chmod-world"
    reason  = "chmod 777 grants world write"
    pattern = '\bchmod\b[^;|&]*\b0?777\b'

[[rule]]
    id      = "docker-vol-rm"
    reason  = "docker volume deletion loses data"
    pattern = '\bdocker\s+volume\s+(?:rm|prune)\b'

# Cloud / IaC teardown with an explicit auto-confirm flag. The single-dash
# `-auto-approve` form is also accepted by Terraform; the aws-s3-rm branch uses
# two lookaheads so `--recursive` and the `s3://` URI may appear in any order.
[[rule]]
    id      = "cloud-destroy"
    reason  = "Cloud or IaC destructive operation with auto-confirm"
    pattern = [
        '\bterraform\s+destroy\b[^;|&]*--?auto-approve\b',
        '\baws\s+s3\s+rb\b[^;|&]*--force\b',
        '\baws\s+s3\s+rm\b(?=[^;|&]*--recursive)(?=[^;|&]*s3://)',
        '\bgcloud\b[^;|&]*\bdelete\b[^;|&]*(?:-q\b|--quiet\b)',
        '\bgh\s+repo\s+delete\b[^;|&]*--yes\b',
    ]
