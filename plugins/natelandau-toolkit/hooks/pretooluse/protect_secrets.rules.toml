# Rules for protect_secrets.py, loaded at runtime through the shared
# hooks/lib/rules.py engine. Each [[rule]] targets one named input via its
# `field` key; its `pattern` (regex, re.IGNORECASE) is matched against that
# input:
#
#   - field = "file_path" rules match tool_input.file_path (Read/Edit/Write).
#   - field = "command"   rules match tool_input.command (Bash).
#
# Because a file_path rule sees an empty string on a Bash call (and a
# command rule sees an empty string on a file edit), one rule list serves
# every tool with no per-tool branching. `allowlist` regexes are tested
# first against both inputs; a match short-circuits and lets the call pass
# (used for templates such as `.env.example`). First match wins; iteration
# follows file order. Rules whose `level` is above the active threshold
# (set via [hooks.protect-secrets].level in natelandau-toolkit.toml) are
# skipped.
#
# Rule field schema: level, id, reason, plus exactly one matcher.
# `level` must be one of: critical, high, strict.
#
# Matcher: either a single `pattern` (with an optional `field`, as the rules
# below use) or a `conditions` array of `{ field, operator, pattern }`
# tables, AND-combined, to require several fields at once. The fields
# protect_secrets exposes are file_path, command, content, old_string,
# new_string, and tool_name; operators are regex_match, contains,
# not_contains, equals, starts_with, ends_with. Example:
#
#   [[rule]]
#       id      = "py-hardcoded-secret"
#       level   = "high"
#       reason  = "hardcoded secret in a source file"
#       conditions = [
#           { field = "file_path", operator = "ends_with", pattern = ".py" },
#           { field = "content",   operator = "contains",  pattern = "SECRET" },
#       ]
#
# Pattern strings are TOML literals (single-quoted) so regex backslashes
# pass through verbatim.

# Templates and example files that are always safe. Tested against both
# file paths (Read/Edit/Write) and the entire bash command string. The
# string-end anchors mean `cat .env.example` passes but `cat .env.example
# .env` does not, so the second file is still checked.
allowlist = [
    '\.env\.example$',
    '\.env\.sample$',
    '\.env\.template$',
    '\.env\.schema$',
    '\.env\.defaults$',
    '(?:^|/)env\.example$',
    '(?:^|/)example\.env$',
]


# =============================================================================
# Sensitive file rules (field = "file_path"): matched against the file path
# of Read/Edit/Write.
# =============================================================================

# === CRITICAL ===

[[rule]]
    field   = "file_path"
    id      = "env-file"
    level   = "critical"
    pattern = '(?:^|/)\.env(?:\.[^/]*)?$'
    reason  = ".env file contains secrets"

[[rule]]
    field   = "file_path"
    id      = "envrc"
    level   = "critical"
    pattern = '(?:^|/)\.envrc$'
    reason  = ".envrc (direnv) contains secrets"

[[rule]]
    field   = "file_path"
    id      = "ssh-private-key"
    level   = "critical"
    pattern = '(?:^|/)\.ssh/id_[^/]+$'
    reason  = "SSH private key"

[[rule]]
    field   = "file_path"
    id      = "ssh-private-key-bare"
    level   = "critical"
    pattern = '(?:^|/)(id_rsa|id_ed25519|id_ecdsa|id_dsa)$'
    reason  = "SSH private key"

[[rule]]
    field   = "file_path"
    id      = "ssh-authorized"
    level   = "critical"
    pattern = '(?:^|/)\.ssh/authorized_keys$'
    reason  = "SSH authorized_keys"

[[rule]]
    field   = "file_path"
    id      = "aws-credentials"
    level   = "critical"
    pattern = '(?:^|/)\.aws/credentials$'
    reason  = "AWS credentials file"

[[rule]]
    field   = "file_path"
    id      = "aws-config"
    level   = "critical"
    pattern = '(?:^|/)\.aws/config$'
    reason  = "AWS config may contain secrets"

[[rule]]
    field   = "file_path"
    id      = "kube-config"
    level   = "critical"
    pattern = '(?:^|/)\.kube/config$'
    reason  = "Kubernetes config contains credentials"

[[rule]]
    field   = "file_path"
    id      = "pem-key"
    level   = "critical"
    pattern = '\.pem$'
    reason  = "PEM key file"

[[rule]]
    field   = "file_path"
    id      = "key-file"
    level   = "critical"
    pattern = '\.key$'
    reason  = "Key file"

[[rule]]
    field   = "file_path"
    id      = "p12-key"
    level   = "critical"
    pattern = '\.(p12|pfx)$'
    reason  = "PKCS12 key file"

# === HIGH ===

[[rule]]
    field   = "file_path"
    id      = "credentials-json"
    level   = "high"
    pattern = '(?:^|/)credentials\.json$'
    reason  = "Credentials file"

[[rule]]
    field   = "file_path"
    id      = "secrets-file"
    level   = "high"
    pattern = '(?:^|/)(secrets?|credentials?)\.(json|ya?ml|toml)$'
    reason  = "Secrets configuration file"

[[rule]]
    field   = "file_path"
    id      = "service-account"
    level   = "high"
    pattern = 'service[_-]?account.*\.json$'
    reason  = "GCP service account key"

[[rule]]
    field   = "file_path"
    id      = "gcloud-creds"
    level   = "high"
    pattern = '(?:^|/)\.config/gcloud/.*(credentials|tokens)'
    reason  = "GCloud credentials"

[[rule]]
    field   = "file_path"
    id      = "azure-creds"
    level   = "high"
    pattern = '(?:^|/)\.azure/(credentials|accessTokens)'
    reason  = "Azure credentials"

[[rule]]
    field   = "file_path"
    id      = "docker-config"
    level   = "high"
    pattern = '(?:^|/)\.docker/config\.json$'
    reason  = "Docker config may contain registry auth"

[[rule]]
    field   = "file_path"
    id      = "netrc"
    level   = "high"
    pattern = '(?:^|/)\.netrc$'
    reason  = ".netrc contains credentials"

[[rule]]
    field   = "file_path"
    id      = "npmrc"
    level   = "high"
    pattern = '(?:^|/)\.npmrc$'
    reason  = ".npmrc may contain auth tokens"

[[rule]]
    field   = "file_path"
    id      = "pypirc"
    level   = "high"
    pattern = '(?:^|/)\.pypirc$'
    reason  = ".pypirc contains PyPI credentials"

[[rule]]
    field   = "file_path"
    id      = "gem-creds"
    level   = "high"
    pattern = '(?:^|/)\.gem/credentials$'
    reason  = "RubyGems credentials"

[[rule]]
    field   = "file_path"
    id      = "vault-token"
    level   = "high"
    pattern = '(?:^|/)(\.vault-token|vault-token)$'
    reason  = "Vault token file"

[[rule]]
    field   = "file_path"
    id      = "keystore"
    level   = "high"
    pattern = '\.(keystore|jks)$'
    reason  = "Java keystore"

[[rule]]
    field   = "file_path"
    id      = "htpasswd"
    level   = "high"
    pattern = '(?:^|/)\.?htpasswd$'
    reason  = "htpasswd contains hashed passwords"

[[rule]]
    field   = "file_path"
    id      = "pgpass"
    level   = "high"
    pattern = '(?:^|/)\.pgpass$'
    reason  = "PostgreSQL password file"

[[rule]]
    field   = "file_path"
    id      = "my-cnf"
    level   = "high"
    pattern = '(?:^|/)\.my\.cnf$'
    reason  = "MySQL config may contain password"

# === STRICT ===

[[rule]]
    field   = "file_path"
    id      = "database-config"
    level   = "strict"
    pattern = '(?:^|/)(?:config/)?database\.(json|ya?ml)$'
    reason  = "Database config may contain passwords"

[[rule]]
    field   = "file_path"
    id      = "ssh-known-hosts"
    level   = "strict"
    pattern = '(?:^|/)\.ssh/known_hosts$'
    reason  = "SSH known_hosts reveals infrastructure"

[[rule]]
    field   = "file_path"
    id      = "gitconfig"
    level   = "strict"
    pattern = '(?:^|/)\.gitconfig$'
    reason  = ".gitconfig may contain credentials"

[[rule]]
    field   = "file_path"
    id      = "curlrc"
    level   = "strict"
    pattern = '(?:^|/)\.curlrc$'
    reason  = ".curlrc may contain auth"


# =============================================================================
# Bash command rules (field = "command"): matched against the full command
# string.
# =============================================================================

# === CRITICAL: direct reads of secret files. ===

[[rule]]
    field   = "command"
    id      = "cat-env"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more|bat|view)\s+[^|;]*\.env\b'
    reason  = "Reading .env file exposes secrets"

[[rule]]
    field   = "command"
    id      = "cat-ssh-key"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more|bat)\s+[^|;]*(id_rsa|id_ed25519|id_ecdsa|id_dsa|\.pem|\.key)\b'
    reason  = "Reading private key"

[[rule]]
    field   = "command"
    id      = "cat-aws-creds"
    level   = "critical"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*\.aws/credentials'
    reason  = "Reading AWS credentials"

# === HIGH: environment exposure. ===

[[rule]]
    field   = "command"
    id      = "env-dump"
    level   = "high"
    pattern = '\bprintenv\b|(?:^|[;&|]\s*)env\s*(?:$|[;&|])'
    reason  = "Environment dump may expose secrets"

[[rule]]
    field   = "command"
    id      = "echo-secret-var"
    level   = "high"
    pattern = '\becho\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|PASSW|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?'
    reason  = "Echoing secret variable"

[[rule]]
    field   = "command"
    id      = "printf-secret-var"
    level   = "high"
    pattern = '\bprintf\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?'
    reason  = "Printing secret variable"

[[rule]]
    field   = "command"
    id      = "cat-secrets-file"
    level   = "high"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*(credentials?|secrets?)\.(json|ya?ml|toml)'
    reason  = "Reading secrets file"

[[rule]]
    field   = "command"
    id      = "cat-netrc"
    level   = "high"
    pattern = '\b(cat|less|head|tail|more)\s+[^|;]*\.netrc'
    reason  = "Reading .netrc credentials"

[[rule]]
    field   = "command"
    id      = "source-env"
    level   = "high"
    pattern = '\bsource\s+[^|;]*\.env\b|(?:^|[;&|]\s*)\.\s+[^|;]*\.env\b'
    reason  = "Sourcing .env loads secrets"

[[rule]]
    field   = "command"
    id      = "export-cat-env"
    level   = "high"
    pattern = 'export\s+.*\$\(cat\s+[^)]*\.env'
    reason  = "Exporting secrets from .env"

# === HIGH: exfiltration. ===

[[rule]]
    field   = "command"
    id      = "curl-upload-env"
    level   = "high"
    pattern = '\bcurl\b[^;|&]*(-d\s*@|-F\s*[^=]+=@|--data[^=]*=@)[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)'
    reason  = "Uploading secrets via curl"

[[rule]]
    field   = "command"
    id      = "curl-post-secrets"
    level   = "high"
    pattern = '\bcurl\b[^;|&]*-X\s*POST[^;|&]*(\.env|credentials|secrets)'
    reason  = "POSTing secrets via curl"

[[rule]]
    field   = "command"
    id      = "wget-post-secrets"
    level   = "high"
    pattern = '\bwget\b[^;|&]*--post-file[^;|&]*(\.env|credentials|secrets)'
    reason  = "POSTing secrets via wget"

[[rule]]
    field   = "command"
    id      = "scp-secrets"
    level   = "high"
    pattern = '\bscp\b[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)[^;|&]+:'
    reason  = "Copying secrets via scp"

[[rule]]
    field   = "command"
    id      = "rsync-secrets"
    level   = "high"
    pattern = '\brsync\b[^;|&]*(\.env|credentials|secrets|id_rsa)[^;|&]+:'
    reason  = "Syncing secrets via rsync"

[[rule]]
    field   = "command"
    id      = "nc-secrets"
    level   = "high"
    pattern = '\bnc\b[^;|&]*<[^;|&]*(\.env|credentials|secrets|id_rsa)'
    reason  = "Exfiltrating secrets via netcat"

# === HIGH: copy/move/delete of secret files. ===

[[rule]]
    field   = "command"
    id      = "cp-env"
    level   = "high"
    pattern = '\bcp\b[^;|&]*\.env\b'
    reason  = "Copying .env file"

[[rule]]
    field   = "command"
    id      = "cp-ssh-key"
    level   = "high"
    pattern = '\bcp\b[^;|&]*(id_rsa|id_ed25519|\.pem|\.key)\b'
    reason  = "Copying private key"

[[rule]]
    field   = "command"
    id      = "mv-env"
    level   = "high"
    pattern = '\bmv\b[^;|&]*\.env\b'
    reason  = "Moving .env file"

[[rule]]
    field   = "command"
    id      = "rm-ssh-key"
    level   = "high"
    pattern = '\brm\b[^;|&]*(id_rsa|id_ed25519|id_ecdsa|authorized_keys)'
    reason  = "Deleting SSH key"

[[rule]]
    field   = "command"
    id      = "rm-env"
    level   = "high"
    pattern = '\brm\b.*\.env\b'
    reason  = "Deleting .env file"

[[rule]]
    field   = "command"
    id      = "rm-aws-creds"
    level   = "high"
    pattern = '\brm\b[^;|&]*\.aws/credentials'
    reason  = "Deleting AWS credentials"

[[rule]]
    field   = "command"
    id      = "truncate-secrets"
    level   = "high"
    pattern = '\btruncate\b.*\.(env|pem|key)\b|(?:^|[;&|]\s*)>\s*\.env\b'
    reason  = "Truncating secrets file"

# === HIGH: process environ + indirect access. ===

[[rule]]
    field   = "command"
    id      = "proc-environ"
    level   = "high"
    pattern = '/proc/[^/]*/environ'
    reason  = "Reading process environment"

[[rule]]
    field   = "command"
    id      = "xargs-cat-env"
    level   = "high"
    pattern = 'xargs.*cat|\.env.*xargs'
    reason  = "Reading .env via xargs"

[[rule]]
    field   = "command"
    id      = "find-exec-cat-env"
    level   = "high"
    pattern = 'find\b.*\.env.*-exec|find\b.*-exec.*(cat|less)'
    reason  = "Finding and reading .env files"

# === STRICT ===

[[rule]]
    field   = "command"
    id      = "grep-password"
    level   = "strict"
    pattern = '\bgrep\b[^|;]*(-r|--recursive)[^|;]*(password|secret|api.?key|token|credential)'
    reason  = "Grep for secrets may expose them"

[[rule]]
    field   = "command"
    id      = "base64-secrets"
    level   = "strict"
    pattern = '\bbase64\b[^|;]*(\.env|credentials|secrets|id_rsa|\.pem)'
    reason  = "Base64 encoding secrets"
