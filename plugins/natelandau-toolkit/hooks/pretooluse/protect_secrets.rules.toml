# Rules for protect_secrets.py, loaded at runtime through the shared
# hooks/lib/rules.py engine. Each [[rule]] targets one named input via its
# `field` key; its `pattern` (regex, re.IGNORECASE) is matched against that
# input:
#
#   - field = "file_path" rules match tool_input.file_path (Read/Edit/Write).
#   - field = "command"   rules match tool_input.command (Bash).
#
# Because a file_path rule sees an empty string on a Bash call (and a
# command rule sees an empty string on a file edit), one rule list serves
# every tool with no per-tool branching. `allowlist` regexes are tested
# first against both inputs; a match short-circuits and lets the call pass
# (used for templates such as `.env.example`). First match wins; iteration
# follows file order.
#
# Rule field schema: id, reason, plus exactly one matcher.
#
# Matcher: either a `pattern` or a `conditions` array. A `pattern` is a single
# regex string OR a list of regex strings (OR-combined: the rule fires if any
# matches), which is how same-category rules below collapse into one entry. A
# `conditions` array of `{ field, operator, pattern }` tables is AND-combined,
# to require several fields at once. The fields protect_secrets exposes are
# file_path, command, content, old_string, new_string, and tool_name;
# operators are regex_match, contains, not_contains, equals, starts_with,
# ends_with. Example:
#
#   [[rule]]
#       id      = "py-hardcoded-secret"
#       reason  = "hardcoded secret in a source file"
#       conditions = [
#           { field = "file_path", operator = "ends_with", pattern = ".py" },
#           { field = "content",   operator = "contains",  pattern = "SECRET" },
#       ]
#
# Pattern strings are TOML literals (single-quoted) so regex backslashes
# pass through verbatim.

# Templates and example files that are always safe. Tested against both
# file paths (Read/Edit/Write) and the entire bash command string. The
# string-end anchors mean `cat .env.example` passes but `cat .env.example
# .env` does not, so the second file is still checked.
allowlist = [
    '\.env\.example$',
    '\.env\.sample$',
    '\.env\.template$',
    '\.env\.schema$',
    '\.env\.defaults$',
    '(?:^|/)env\.example$',
    '(?:^|/)example\.env$',
]


# =============================================================================
# Sensitive file rules (field = "file_path"): matched against the file path
# of Read/Edit/Write. Each rule lists the paths that share one reason.
# =============================================================================

[[rule]]
    field   = "file_path"
    id      = "env-file"
    reason  = "Environment file may contain secrets"
    pattern = [
        '(?:^|/)\.env(?:\.[^/]*)?$',
        '(?:^|/)\.envrc$',
    ]

[[rule]]
    field   = "file_path"
    id      = "ssh-key"
    reason  = "SSH key file"
    pattern = [
        '(?:^|/)\.ssh/id_[^/]+$',
        '(?:^|/)(id_rsa|id_ed25519|id_ecdsa|id_dsa)$',
        '(?:^|/)\.ssh/authorized_keys$',
    ]

[[rule]]
    field   = "file_path"
    id      = "cloud-creds"
    reason  = "Cloud provider credentials"
    pattern = [
        '(?:^|/)\.aws/credentials$',
        '(?:^|/)\.aws/config$',
        '(?:^|/)\.kube/config$',
        '(?:^|/)\.config/gcloud/.*(credentials|tokens)',
        '(?:^|/)\.azure/(credentials|accessTokens)',
    ]

[[rule]]
    field   = "file_path"
    id      = "private-key"
    reason  = "Private key or keystore file"
    pattern = [
        '\.pem$',
        '\.key$',
        '\.(p12|pfx)$',
        '\.(keystore|jks)$',
    ]

# `credentials.json` is covered by the `credentials?\.json` branch here, so it
# needs no separate rule.
[[rule]]
    field   = "file_path"
    id      = "secrets-file"
    reason  = "Secrets or credentials file"
    pattern = [
        '(?:^|/)(secrets?|credentials?)\.(json|ya?ml|toml)$',
        'service[_-]?account.*\.json$',
    ]

[[rule]]
    field   = "file_path"
    id      = "package-creds"
    reason  = "Package manager credentials"
    pattern = [
        '(?:^|/)\.npmrc$',
        '(?:^|/)\.pypirc$',
        '(?:^|/)\.gem/credentials$',
    ]

[[rule]]
    field   = "file_path"
    id      = "db-creds"
    reason  = "Database credentials file"
    pattern = [
        '(?:^|/)\.pgpass$',
        '(?:^|/)\.my\.cnf$',
    ]

[[rule]]
    field   = "file_path"
    id      = "auth-file"
    reason  = "Credentials or auth file"
    pattern = [
        '(?:^|/)\.netrc$',
        '(?:^|/)\.docker/config\.json$',
        '(?:^|/)(\.vault-token|vault-token)$',
        '(?:^|/)\.?htpasswd$',
    ]


# =============================================================================
# Bash command rules (field = "command"): matched against the full command
# string. Each rule lists the command shapes that share one reason.
# =============================================================================

[[rule]]
    field   = "command"
    id      = "read-secret"
    reason  = "Reading a secret file exposes secrets"
    pattern = [
        '\b(cat|less|head|tail|more|bat|view)\s+[^|;]*\.env\b',
        '\b(cat|less|head|tail|more|bat)\s+[^|;]*(id_rsa|id_ed25519|id_ecdsa|id_dsa|\.pem|\.key)\b',
        '\b(cat|less|head|tail|more)\s+[^|;]*\.aws/credentials',
        '\b(cat|less|head|tail|more)\s+[^|;]*(credentials?|secrets?)\.(json|ya?ml|toml)',
        '\b(cat|less|head|tail|more)\s+[^|;]*\.netrc',
    ]

[[rule]]
    field   = "command"
    id      = "env-exposure"
    reason  = "Exposing environment secrets"
    pattern = [
        '\bprintenv\b|(?:^|[;&|]\s*)env\s*(?:$|[;&|])',
        '\becho\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|PASSW|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?',
        '\bprintf\b[^;|&]*\$\{?[A-Za-z_]*(?:SECRET|KEY|TOKEN|PASSWORD|CREDENTIAL|API_KEY|AUTH|PRIVATE)[A-Za-z_]*\}?',
        '\bsource\s+[^|;]*\.env\b|(?:^|[;&|]\s*)\.\s+[^|;]*\.env\b',
        'export\s+.*\$\(cat\s+[^)]*\.env',
    ]

[[rule]]
    field   = "command"
    id      = "exfiltration"
    reason  = "Exfiltrating secrets over the network"
    pattern = [
        '\bcurl\b[^;|&]*(-d\s*@|-F\s*[^=]+=@|--data[^=]*=@)[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)',
        '\bcurl\b[^;|&]*-X\s*POST[^;|&]*(\.env|credentials|secrets)',
        '\bwget\b[^;|&]*--post-file[^;|&]*(\.env|credentials|secrets)',
        '\bscp\b[^;|&]*(\.env|credentials|secrets|id_rsa|\.pem|\.key)[^;|&]+:',
        '\brsync\b[^;|&]*(\.env|credentials|secrets|id_rsa)[^;|&]+:',
        '\bnc\b[^;|&]*<[^;|&]*(\.env|credentials|secrets|id_rsa)',
    ]

[[rule]]
    field   = "command"
    id      = "modify-secret"
    reason  = "Copying, moving, or deleting a secret file"
    pattern = [
        '\bcp\b[^;|&]*\.env\b',
        '\bcp\b[^;|&]*(id_rsa|id_ed25519|\.pem|\.key)\b',
        '\bmv\b[^;|&]*\.env\b',
        '\brm\b[^;|&]*(id_rsa|id_ed25519|id_ecdsa|authorized_keys)',
        '\brm\b.*\.env\b',
        '\brm\b[^;|&]*\.aws/credentials',
        '\btruncate\b.*\.(env|pem|key)\b|(?:^|[;&|]\s*)>\s*\.env\b',
    ]

[[rule]]
    field   = "command"
    id      = "indirect-read"
    reason  = "Indirect secret read"
    pattern = [
        '/proc/[^/]*/environ',
        'xargs.*cat|\.env.*xargs',
        'find\b.*\.env.*-exec|find\b.*-exec.*(cat|less)',
    ]
